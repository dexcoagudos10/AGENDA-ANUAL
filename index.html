<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Logística e Financeira Duratex</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --success: #27ae60;
            --info: #3498db;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #333;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        
        .sidebar { width: 340px; background: var(--primary); color: white; padding: 25px; position: fixed; height: 100vh; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); box-sizing: border-box; z-index: 100; }
        .main-content { margin-left: 340px; padding: 30px; flex-grow: 1; box-sizing: border-box; width: calc(100% - 340px); }

        h1, h2, h3 { margin-top: 0; color: var(--primary); }
        .sidebar h2, .sidebar h3 { color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .sidebar .card { background: rgba(255,255,255,0.1); color: white; border: none; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9em; }
        
        .row-inputs { display: flex; gap: 8px; flex-wrap: wrap; }
        .row-inputs .form-group { flex: 1; min-width: 48%; }

        .btn { padding: 12px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; text-align: center; display: block; width: 100%; font-size: 0.95em; margin-bottom: 10px; }
        .btn-add { background: var(--success); color: white; }
        .btn-export { background: #2980b9; color: white; }
        .btn-admin { background: var(--accent); color: white; }
        .btn-update { background: #3498db; color: white; }
        .btn-cancel { background: #95a5a6; color: white; font-size: 0.8em; padding: 8px; }

        /* Dashboard Financeiro */
        .dash-fin { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .dash-card { flex: 1; min-width: 220px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dash-danger { background: var(--danger); }
        .dash-warning { background: var(--warning); color: #333; }
        .dash-success { background: var(--success); }

        .filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .month-select { width: 100%; max-width: 250px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; background: #ddd; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
        .cal-header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 0.9em; }
        .cal-day { background: white; min-height: 110px; padding: 8px; position: relative; min-width: 0; overflow: hidden; }
        .cal-day.today { background: #e8f4fd; }
        .day-number { font-weight: bold; font-size: 1em; margin-bottom: 6px; display: block; }
        
        .event-item { font-size: 0.7em; padding: 3px 6px; border-radius: 4px; margin-bottom: 3px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .event-critical { background: var(--danger); }
        .event-pending { background: var(--warning); color: #333; }
        .event-ok { background: var(--success); }
        .event-vendor { font-style: italic; opacity: 0.9; display: block; font-size: 0.85em; }

        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; min-width: 800px; }
        th { text-align: left; padding: 12px; background: #eee; color: var(--primary); font-weight: 600; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .row-critical { background-color: #fff5f5; border-left: 4px solid var(--danger); }
        .row-finance-alert { background-color: #fdf2e9; border-left: 4px solid var(--accent); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; display: inline-block; text-align: center; min-width: 25px; }
        .badge-s { background: #d4edda; color: #155724; }
        .badge-n { background: #f8d7da; color: #721c24; }
        
        .alert-text { color: var(--danger); font-weight: bold; font-size: 0.85em; display: block; margin-top: 5px; }

        .admin-controls { display: none; margin-top: 5px; gap: 4px; flex-wrap: wrap; }
        body.admin-mode .admin-controls { display: flex; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }

        .btn-status { padding: 4px 6px; font-size: 0.7em; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 3px; flex: 1; min-width: 25px; text-align: center;}
        .btn-status.active { background: var(--primary); color: white; }
        .btn-action { background: none; border: none; cursor: pointer; font-size: 1.2em; padding: 4px; }

        .col-divider { border-left: 2px solid #eee; }

        /* ======== REGRAS DE RESPONSIVIDADE (CELULARES E TABLETS) ======== */
        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; box-shadow: none; border-bottom: 3px solid var(--primary); }
            .main-content { margin-left: 0; padding: 15px; width: 100%; }
        }

        @media (max-width: 768px) {
            .dash-fin { flex-direction: column; gap: 10px; }
            .dash-card { min-width: 100%; padding: 12px; }
            
            .filter-bar h2 { font-size: 1.2em; margin-bottom: 5px; }
            
            .calendar-grid { font-size: 0.85em; }
            .cal-header { padding: 6px 2px; font-size: 0.8em; }
            .cal-day { min-height: 80px; padding: 4px; }
            .event-item { font-size: 0.65em; padding: 2px; }
            .day-number { font-size: 0.9em; margin-bottom: 3px; }

            .row-inputs { flex-direction: column; gap: 0; }
            .row-inputs .form-group { width: 100%; min-width: 100%; }

            /* Ajustes finos na tabela para mobile */
            th, td { padding: 8px 6px; font-size: 0.95em; }
            .badge { padding: 3px 6px; font-size: 0.8em; }
            .admin-controls { flex-direction: column; align-items: stretch; } /* Botões S/N um debaixo do outro */
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Duratex | Admin</h2>
    <p style="font-size: 0.85em; opacity: 0.8; margin-bottom: 20px;">Pedro Vicente</p>
    
    <button class="btn btn-export" onclick="exportToExcel()">📥 Exportar Dados (Excel)</button>
    <button class="btn btn-admin" id="adminBtn" onclick="toggleAdmin()">Ativar Modo Editor</button>
    
    <div class="card admin-only" style="margin-top: 20px;">
        <h3 id="formTitle">Nova Reserva</h3>
        <div class="form-group">
            <label>Destino / Cliente</label>
            <input type="text" id="newDest">
        </div>
        <div class="row-inputs">
            <div class="form-group">
                <label>Vendedor</label>
                <input type="text" id="newVendor" placeholder="Ex: Gabriel">
            </div>
            <div class="form-group">
                <label>Evento</label>
                <select id="newType">
                    <option value="TCD">TCD</option>
                    <option value="PAV">PAV</option>
                    <option value="COFFE EM LOJA $">Coffe</option>
                    <option value="FEIRA">Feira</option>
                </select>
            </div>
        </div>
        <div class="row-inputs">
            <div class="form-group">
                <label>Entrada</label>
                <input type="date" id="newDateIn">
            </div>
            <div class="form-group">
                <label>Saída</label>
                <input type="date" id="newDateOut">
            </div>
        </div>
        <button class="btn btn-add" id="saveBtn" onclick="saveTravel()">Guardar Viagem</button>
        <button class="btn btn-cancel" id="cancelBtn" style="display:none;" onclick="cancelEdit()">Cancelar</button>
    </div>
</div>

<div class="main-content">
    <div class="dash-fin">
        <div class="dash-card dash-danger">
            <span style="font-size: 2em;" id="count-atrasados">0</span><br>
            🚨 Atrasos Financeiros (> 15 dias)
        </div>
        <div class="dash-card dash-warning">
            <span style="font-size: 2em;" id="count-pendentes">0</span><br>
            ⏳ Aguardando Notas / Prazo
        </div>
        <div class="dash-card dash-success">
            <span style="font-size: 2em;" id="count-pagos">0</span><br>
            ✅ Pagamentos Concluídos
        </div>
    </div>

    <div class="filter-bar">
        <h2>Painel Logístico e Financeiro</h2>
        <div class="month-select">
            <select id="viewMonth" onchange="initDashboard()"></select>
        </div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <h2 style="margin-top: 40px;">Cronograma Anual de Viagens (2026)</h2>
    <div class="card" style="padding: 0;">

                        <th class="admin-only">Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>

        </div>
    </div>
</div>

    let travels = rawTravels.map(t => ({
        ...t,
        nota: t.nota || 'N',
        pago: t.pago || 'N'

    function initDashboard() {
        const select = document.getElementById('viewMonth');
        if (select.options.length === 0) {
            const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            months.forEach((m, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = m + " 2026";
                if(i === new Date().getMonth()) opt.selected = true;
                select.add(opt);
            });
        }
        renderCalendar();
        renderTable();
    }

    function toggleAdmin() {
        if (!document.body.classList.contains('admin-mode')) {
            if (prompt("Senha de Acesso:") === SENHA_ADMIN) {
                document.body.classList.add('admin-mode');
                document.getElementById('adminBtn').innerText = "Sair do Modo Editor";
            }
        } else {
            document.body.classList.remove('admin-mode');
            document.getElementById('adminBtn').innerText = "Ativar Modo Editor";
            cancelEdit();
        }
    }

    function saveTravel() {
        const dest = document.getElementById('newDest').value;
        const vendor = document.getElementById('newVendor').value;
        const type = document.getElementById('newType').value;
        const ida = document.getElementById('newDateIn').value;
        const volta = document.getElementById('newDateOut').value;
        
        if(!dest || !ida || !volta) return alert("Preencha os campos obrigatórios.");

        if (editingId) {
            const idx = travels.findIndex(t => t.id === editingId);
            travels[idx] = { ...travels[idx], dest, vendor, type, ida, volta };
            editingId = null;
        } else {
            travels.push({ id: Date.now(), dest, vendor, type, ida, volta, voo: "N", hotel: "N", nota: "N", pago: "N" });
        }

        saveData();
        cancelEdit();
    }

    function editTravel(id) {
        const t = travels.find(t => t.id === id);
        editingId = id;
        document.getElementById('newDest').value = t.dest;
        document.getElementById('newVendor').value = t.vendor || '';
        document.getElementById('newType').value = t.type || 'TCD';
        document.getElementById('newDateIn').value = t.ida;
        document.getElementById('newDateOut').value = t.volta;
        document.getElementById('formTitle').innerText = "Editar Registo";
        document.getElementById('saveBtn').innerText = "Atualizar";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('newDest').value = '';
        document.getElementById('newVendor').value = '';
        document.getElementById('newDateIn').value = '';
        document.getElementById('newDateOut').value = '';
        document.getElementById('formTitle').innerText = "Nova Reserva";
        document.getElementById('saveBtn').innerText = "Guardar Viagem";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function setStatus(id, field, val) {
        const index = travels.findIndex(t => t.id === id);
        travels[index][field] = val;
        saveData();
    }

    function saveData() {
        localStorage.setItem('pedro_viagens_v8', JSON.stringify(travels));
        initDashboard();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const selMonth = parseInt(document.getElementById('viewMonth').value);
        const year = 2026;
        
        ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].forEach(d => grid.innerHTML += `<div class="cal-header">${d}</div>`);

        const firstDay = new Date(year, selMonth, 1).getDay();
        const lastDay = new Date(year, selMonth + 1, 0).getDate();

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-day" style="background:#eee"></div>`;

        for(let d=1; d<=lastDay; d++) {
            const dateStr = `${year}-${String(selMonth+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            let dayHtml = `<div class="cal-day"><strong>${d}</strong>`;
            
            travels.filter(t => dateStr >= t.ida && dateStr <= t.volta).forEach(e => {
                const diff = (new Date(e.ida) - new Date()) / 86400000;
                const isCritical = diff >= 0 && diff < 30 && (e.voo==='N' || e.hotel==='N');
                const statusClass = isCritical ? 'event-critical' : (e.voo==='S'&&e.hotel==='S'?'event-ok':'event-pending');
                
                dayHtml += `<div class="event-item ${statusClass}" title="${e.dest} - ${e.vendor}">
                                <b>[${e.type}]</b> ${e.dest}
                                <span class="event-vendor">${e.vendor || ''}</span>
                            </div>`;
            });
            grid.innerHTML += dayHtml + `</div>`;
        }
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        
        const today = new Date();
        today.setHours(0,0,0,0);

        let countAtrasados = 0;
        let countPendentes = 0;
        let countPagos = 0;

        travels.sort((a,b) => new Date(a.ida) - new Date(b.ida)).forEach(t => {
            const diffLogistica = (new Date(t.ida) - today) / 86400000;
            const isLogisticaCritical = diffLogistica >= 0 && diffLogistica < 30 && (t.voo==='N' || t.hotel==='N');
            
            const dataVolta = new Date(t.volta);
            dataVolta.setHours(0,0,0,0);
            const diasPosEvento = Math.floor((today - dataVolta) / 86400000);
            
            let isFinanceiroLate = false;
            let statusFinanceiro = "-";

            if (diasPosEvento > 0) {
                if (t.pago === 'S') {
                    countPagos++;
                    statusFinanceiro = "<span style='color:green;'>Finalizado</span>";
                } else if (diasPosEvento > 15) {
                    countAtrasados++;
                    isFinanceiroLate = true;
                    statusFinanceiro = `<span class="alert-text">🚨 COBRAR (${diasPosEvento} dias)</span>`;
                } else {
                    countPendentes++;
                    statusFinanceiro = `<span style="color:#f39c12; font-weight:bold;">Prazo: ${15 - diasPosEvento} dias</span>`;
                }
            } else {
                statusFinanceiro = "<span style='color:#7f8c8d; font-size: 0.9em;'>Aguardando Evento</span>";
            }

            let rowClass = "";
            if (isLogisticaCritical) rowClass = "row-critical";
            else if (isFinanceiroLate) rowClass = "row-finance-alert";

            body.innerHTML += `
                <tr class="${rowClass}">
                    <td><strong>${t.dest}</strong><br><small>[${t.type || 'TCD'}]</small></td>
                    <td>${t.vendor || '-'}</td>
                    <td style="white-space: nowrap;">${t.ida.split('-').reverse().join('/')} <br> ${t.volta.split('-').reverse().join('/')}</td>
                    
                    <td class="col-divider">
                        <span class="badge ${t.voo==='S'?'badge-s':'badge-n'}">${t.voo}</span>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'voo','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'voo','N')">N</button></div>
                    </td>
                    <td>
                        <span class="badge ${t.hotel==='S'?'badge-s':'badge-n'}">${t.hotel}</span>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'hotel','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'hotel','N')">N</button></div>
                    </td>

                    <td class="col-divider">
                        <span class="badge ${t.nota==='S'?'badge-s':'badge-n'}">${t.nota === 'S' ? 'Recebida' : 'Pendente'}</span>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'nota','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'nota','N')">N</button></div>
                    </td>
                    <td>
                        <span class="badge ${t.pago==='S'?'badge-s':'badge-n'}">${t.pago === 'S' ? 'Pago' : 'Pendente'}</span>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'pago','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'pago','N')">N</button></div>
                        ${statusFinanceiro}
                    </td>

                    <td class="admin-only">
                        <button class="btn-action" onclick="editTravel(${t.id})">✏️</button>
                    </td>
                </tr>`;
        });

        document.getElementById('count-atrasados').innerText = countAtrasados;
        document.getElementById('count-pendentes').innerText = countPendentes;
        document.getElementById('count-pagos').innerText = countPagos;
    }

    function exportToExcel() {
        let csv = "\ufeff"; 
        csv += "Destino,Vendedor,Evento,Data Ida,Data Volta,Voo,Hotel,Nota,Pago\n";
        travels.forEach(t => {
            csv += `"${t.dest}","${t.vendor || ''}","${t.type || ''}","${t.ida}","${t.volta}","${t.voo}","${t.hotel}","${t.nota}","${t.pago}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "controle_duratex_pedro.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    initDashboard();
</script>
</body>
</html>
