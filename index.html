<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestão Logística e Financeira Duratex</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --danger: #e74c3c;
            --warning: #f1c40f;
            --success: #27ae60;
            --info: #3498db;
            --bg: #f8f9fa;
            --white: #ffffff;
            --text: #333;
        }

        /* Trava global para impedir que a página estique lateralmente */
        html, body { max-width: 100vw; overflow-x: hidden; }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
        
        .sidebar { width: 340px; background: var(--primary); color: white; padding: 25px; position: fixed; height: 100vh; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); box-sizing: border-box; z-index: 100; }
        .main-content { margin-left: 340px; padding: 30px; flex-grow: 1; box-sizing: border-box; width: calc(100% - 340px); }

        h1, h2, h3 { margin-top: 0; color: var(--primary); }
        .sidebar h2, .sidebar h3 { color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }

        .card { background: var(--white); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; width: 100%; box-sizing: border-box; }
        .sidebar .card { background: rgba(255,255,255,0.1); color: white; border: none; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 0.9em; }
        
        .row-inputs { display: flex; gap: 8px; flex-wrap: wrap; }
        .row-inputs .form-group { flex: 1; min-width: 48%; }

        .btn { padding: 12px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; text-align: center; display: block; width: 100%; font-size: 0.95em; margin-bottom: 10px; box-sizing: border-box; }
        .btn-add { background: var(--success); color: white; }
        .btn-export { background: #2980b9; color: white; }
        .btn-import { background: #8e44ad; color: white; }
        .btn-admin { background: var(--accent); color: white; }
        .btn-update { background: #3498db; color: white; }
        .btn-cancel { background: #95a5a6; color: white; font-size: 0.8em; padding: 8px; }

        .action-buttons-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .action-buttons-row .btn { margin-bottom: 0; padding: 10px; font-size: 0.85em; }

        /* Dashboard Financeiro */
        .dash-fin { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .dash-card { flex: 1; min-width: 200px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .dash-danger { background: var(--danger); }
        .dash-warning { background: var(--warning); color: #333; }
        .dash-success { background: var(--success); }

        .filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .month-select { width: 100%; max-width: 250px; }

        /* ======== CALENDÁRIO ======== */
        .calendar-wrapper { width: 100%; padding-bottom: 15px; border-radius: 8px; box-sizing: border-box; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: #ddd; border: 1px solid #ddd; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .cal-header { background: var(--primary); color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 0.9em; }
        .cal-day { background: white; min-height: 120px; padding: 8px; position: relative; }
        .cal-day.today { background: #e8f4fd; border: 2px solid var(--info); }
        .day-number { font-weight: bold; font-size: 1em; margin-bottom: 6px; display: block; }
        
        .event-item { font-size: 0.7em; padding: 4px 6px; border-radius: 4px; margin-bottom: 3px; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .event-critical { background: var(--danger); }
        .event-pending { background: var(--warning); color: #333; }
        .event-ok { background: var(--success); }
        .event-vendor { font-style: italic; opacity: 0.9; display: block; font-size: 0.85em; margin-top: 2px; }

        /* Tabela Normal */
        .table-wrapper { width: 100%; overflow-x: auto; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; background: white; min-width: 900px; }
        th { text-align: left; padding: 12px; background: #eee; color: var(--primary); font-weight: 600; white-space: nowrap; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        .row-critical { background-color: #fff5f5; border-left: 4px solid var(--danger); }
        .row-finance-alert { background-color: #fdf2e9; border-left: 4px solid var(--accent); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: bold; display: inline-block; text-align: center; min-width: 25px; }
        .badge-s { background: #d4edda; color: #155724; }
        .badge-n { background: #f8d7da; color: #721c24; }
        
        .alert-text { color: var(--danger); font-weight: bold; font-size: 0.85em; display: block; margin-top: 5px; white-space: nowrap; }

        .admin-controls { display: none; margin-top: 5px; gap: 4px; flex-wrap: wrap; }
        body.admin-mode .admin-controls { display: flex; }
        .admin-only { display: none; }
        body.admin-mode .admin-only { display: block; }

        .btn-status { padding: 4px 6px; font-size: 0.7em; border: 1px solid #ccc; background: white; cursor: pointer; border-radius: 3px; flex: 1; min-width: 25px; text-align: center;}
        .btn-status.active { background: var(--primary); color: white; }
        .btn-action { background: var(--primary); color: white; border: none; cursor: pointer; font-size: 0.8em; padding: 6px 12px; border-radius: 4px; }

        .col-divider { border-left: 2px solid #eee; }
        
        .table-header-row { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }

        /* ======== RESPONSIVIDADE PARA TELEMÓVEIS ======== */
        @media (max-width: 1000px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 20px; border-bottom: 3px solid var(--primary); z-index: 10; }
            .main-content { margin-left: 0; padding: 10px; width: 100%; box-sizing: border-box; overflow-x: hidden; }
            
            .dash-fin { flex-direction: column; gap: 10px; }
            .dash-card { min-width: 100%; padding: 12px; }
            
            .filter-bar { justify-content: center; text-align: center; }
            .filter-bar h2 { font-size: 1.2em; width: 100%; margin-bottom: 10px; }
            .month-select { max-width: 100%; }

            .calendar-wrapper { padding-bottom: 10px; overflow-x: hidden; }
            .calendar-grid { grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; }
            .cal-header { padding: 6px 0; font-size: 0.65em; }
            
            .cal-day { min-width: 0; min-height: 70px; padding: 3px; overflow: hidden; }
            .day-number { font-size: 0.85em; margin-bottom: 3px; }
            
            .event-item { font-size: 0.6em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 4px 2px; display: block; }
            .event-vendor { font-size: 0.85em; margin-top: 2px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

            .table-wrapper { padding: 0; overflow: visible; }
            table { width: 100%; display: block; background: transparent; min-width: auto; }
            thead { display: none; }
            tbody { display: block; width: 100%; }
            
            tr { display: block; width: 100%; background: #fff; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #ddd; border-left: 5px solid #ccc; box-sizing: border-box; }
            .row-critical { border-left: 5px solid var(--danger); }
            .row-finance-alert { border-left: 5px solid var(--accent); }
            
            td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; padding: 12px 15px; text-align: right; width: 100%; box-sizing: border-box; }
            td:last-child { border-bottom: none; }
            
            td::before { content: attr(data-label); font-weight: bold; color: var(--primary); font-size: 0.85em; text-transform: uppercase; margin-right: 15px; text-align: left; flex-shrink: 0; }
            
            td > div { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
            .admin-controls { flex-direction: row; width: auto; justify-content: flex-end; }
            .badge { min-width: 60px; text-align: center; margin-bottom: 3px; }
            .alert-text { font-size: 0.75em; text-align: right; white-space: normal; }
            .col-divider { border-left: none; }
            
            .card { padding: 10px; background: transparent; box-shadow: none; margin-bottom: 0; }
            
            .table-header-row h2 { font-size: 1.1em; margin: 0; width: 100%; margin-bottom: 10px;}
            .table-controls { width: 100%; justify-content: space-between; }
            .table-controls select, .table-controls button { flex: 1; padding: 10px; font-size: 0.8em; text-align: center;}
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Duratex | Admin</h2>
    <p style="font-size: 0.85em; opacity: 0.8; margin-bottom: 20px;">Pedro Vicente</p>
    
    <div class="action-buttons-row">
        <button class="btn btn-export" onclick="exportToExcel()">📥 Exportar</button>
        <button class="btn btn-import" onclick="document.getElementById('fileImport').click()">📤 Importar</button>
    </div>
    
    <input type="file" id="fileImport" accept="*/*" style="display: none;" onchange="importFromExcel(event)">
    
    <button class="btn btn-admin" id="adminBtn" style="margin-top: 10px;" onclick="toggleAdmin()">Ativar Modo Editor</button>
    
    <div class="card admin-only" style="margin-top: 20px; background: rgba(255,255,255,0.05); padding: 15px;">
        <h3 id="formTitle">Nova Reserva</h3>
        <div class="form-group">
            <label>Destino / Cliente</label>
            <input type="text" id="newDest">
        </div>
        <div class="row-inputs">
            <div class="form-group">
                <label>Vendedor</label>
                <input type="text" id="newVendor" placeholder="Ex: Gabriel">
            </div>
            <div class="form-group">
                <label>Evento</label>
                <select id="newType">
                    <option value="TCD">TCD</option>
                    <option value="PAV">PAV</option>
                    <option value="COFFE EM LOJA $">Coffe</option>
                    <option value="FEIRA">Feira</option>
                </select>
            </div>
        </div>
        <div class="row-inputs">
            <div class="form-group">
                <label>Entrada</label>
                <input type="date" id="newDateIn">
            </div>
            <div class="form-group">
                <label>Saída</label>
                <input type="date" id="newDateOut">
            </div>
        </div>
        <button class="btn btn-add" id="saveBtn" onclick="saveTravel()">Guardar Viagem</button>
        <button class="btn btn-cancel" id="cancelBtn" style="display:none;" onclick="cancelEdit()">Cancelar</button>
    </div>
</div>

<div class="main-content">
    <div class="dash-fin">
        <div class="dash-card dash-danger">
            <span style="font-size: 2em;" id="count-atrasados">0</span><br>
            🚨 Atrasos Financeiros (> 15 dias)
        </div>
        <div class="dash-card dash-warning">
            <span style="font-size: 2em;" id="count-pendentes">0</span><br>
            ⏳ Aguardando Notas / Prazo
        </div>
        <div class="dash-card dash-success">
            <span style="font-size: 2em;" id="count-pagos">0</span><br>
            ✅ Pagamentos Concluídos
        </div>
    </div>

    <div class="filter-bar">
        <h2>Painel Logístico e Financeiro</h2>
        <div class="month-select">
            <select id="viewMonth" onchange="initDashboard()"></select>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="table-header-row">
        <h2 style="margin: 0;">Cronograma de Viagens (2026)</h2>
        <div class="table-controls" style="display: flex; gap: 8px; flex-wrap: wrap;">
            <select id="tableMonth" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; font-weight: bold; color: var(--primary); outline: none; cursor: pointer; min-width: 150px;" onchange="renderTable()">
                <option value="all">🗓️ Todos os Meses</option>
            </select>
            <button id="togglePastBtn" class="btn btn-cancel" style="width: auto; margin: 0; padding: 8px 12px; font-size: 0.85em;" onclick="togglePastTrips()">👁️ Exibir Anteriores</button>
        </div>
    </div>
    
    <div class="card" style="padding:0;">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Local</th>
                        <th>Vendedor</th>
                        <th>Período</th>
                        <th class="col-divider">Voo</th>
                        <th>Hotel</th>
                        <th class="col-divider" style="color: var(--accent);">Nota Fiscal</th>
                        <th style="color: var(--accent);">Pagamento SLA</th>
                        <th class="admin-only">Ações</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SENHA_ADMIN = "duratex2026"; 
    let editingId = null;
    let hidePastTrips = true;

    let storedData = localStorage.getItem('pedro_viagens_v9');
    let parsedData = storedData ? JSON.parse(storedData) : [];

    let defaultTravels = [
  { "id": 1, "dest": "VISITAS", "vendor": "", "type": "TCD", "ida": "2026-02-09", "volta": "2026-02-11", "voo": "S", "hotel": "S", "nota": "N", "pago": "N" },
  { "id": 2, "dest": "PLANEJAMENTO", "vendor": "", "type": "TCD", "ida": "2026-02-16", "volta": "2026-02-20", "voo": "S", "hotel": "S", "nota": "N", "pago": "N" },
  { "id": 3, "dest": "Convenção Comercial", "vendor": "", "type": "TCD", "ida": "2026-02-24", "volta": "2026-02-26", "voo": "S", "hotel": "S", "nota": "N", "pago": "N" }
];

    let rawTravels = parsedData.length > 0 ? parsedData : defaultTravels;

    let travels = rawTravels.map(t => ({
        ...t,
        nota: t.nota || 'N',
        pago: t.pago || 'N'
    }));

    function initDashboard() {
        const select = document.getElementById('viewMonth');
        const tableSelect = document.getElementById('tableMonth');
        const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
        
        if (select.options.length === 0) {
            months.forEach((m, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = m + " 2026";
                if(i === new Date().getMonth()) opt.selected = true;
                select.add(opt);
            });
        }
        
        if (tableSelect.options.length === 1) { 
            months.forEach((m, i) => {
                let opt = document.createElement('option');
                opt.value = i;
                opt.text = m;
                tableSelect.add(opt);
            });
        }

        renderCalendar();
        renderTable();
    }

    function togglePastTrips() {
        hidePastTrips = !hidePastTrips;
        const btn = document.getElementById('togglePastBtn');
        if (hidePastTrips) {
            btn.innerHTML = "👁️ Exibir Anteriores";
            btn.className = "btn btn-cancel";
        } else {
            btn.innerHTML = "🙈 Ocultar Anteriores";
            btn.className = "btn btn-update";
        }
        renderTable();
    }

    function toggleAdmin() {
        if (!document.body.classList.contains('admin-mode')) {
            if (prompt("Senha de Acesso:") === SENHA_ADMIN) {
                document.body.classList.add('admin-mode');
                document.getElementById('adminBtn').innerText = "Sair do Modo Editor";
            }
        } else {
            document.body.classList.remove('admin-mode');
            document.getElementById('adminBtn').innerText = "Ativar Modo Editor";
            cancelEdit();
        }
    }

    function saveTravel() {
        const dest = document.getElementById('newDest').value;
        const vendor = document.getElementById('newVendor').value;
        const type = document.getElementById('newType').value;
        const ida = document.getElementById('newDateIn').value;
        const volta = document.getElementById('newDateOut').value;
        
        if(!dest || !ida || !volta) return alert("Preencha os campos obrigatórios.");

        if (editingId) {
            const idx = travels.findIndex(t => t.id === editingId);
            travels[idx] = { ...travels[idx], dest, vendor, type, ida, volta };
            editingId = null;
        } else {
            travels.push({ id: Date.now(), dest, vendor, type, ida, volta, voo: "N", hotel: "N", nota: "N", pago: "N" });
        }

        saveData();
        cancelEdit();
    }

    function editTravel(id) {
        const t = travels.find(t => t.id === id);
        editingId = id;
        document.getElementById('newDest').value = t.dest;
        document.getElementById('newVendor').value = t.vendor || '';
        document.getElementById('newType').value = t.type || 'TCD';
        document.getElementById('newDateIn').value = t.ida;
        document.getElementById('newDateOut').value = t.volta;
        document.getElementById('formTitle').innerText = "Editar Registo";
        document.getElementById('saveBtn').innerText = "Atualizar";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    function cancelEdit() {
        editingId = null;
        document.getElementById('newDest').value = '';
        document.getElementById('newVendor').value = '';
        document.getElementById('newDateIn').value = '';
        document.getElementById('newDateOut').value = '';
        document.getElementById('formTitle').innerText = "Nova Reserva";
        document.getElementById('saveBtn').innerText = "Guardar Viagem";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function setStatus(id, field, val) {
        const index = travels.findIndex(t => t.id === id);
        travels[index][field] = val;
        saveData();
    }

    function saveData() {
        localStorage.setItem('pedro_viagens_v9', JSON.stringify(travels));
        initDashboard();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const selMonth = parseInt(document.getElementById('viewMonth').value);
        const year = 2026;
        
        ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].forEach(d => grid.innerHTML += `<div class="cal-header">${d}</div>`);

        const firstDay = new Date(year, selMonth, 1).getDay();
        const lastDay = new Date(year, selMonth + 1, 0).getDate();
        
        const todayStr = new Date().toISOString().split('T')[0];

        for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-day" style="background:#eee"></div>`;

        for(let d=1; d<=lastDay; d++) {
            const dateStr = `${year}-${String(selMonth+1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const isToday = todayStr === dateStr;
            let dayHtml = `<div class="cal-day ${isToday ? 'today' : ''}"><strong>${d}</strong>`;
            
            travels.filter(t => dateStr >= t.ida && dateStr <= t.volta).forEach(e => {
                const dataIdaTime = new Date(e.ida.split('-')[0], e.ida.split('-')[1]-1, e.ida.split('-')[2]);
                const diff = (dataIdaTime - new Date()) / 86400000;
                const isCritical = diff >= 0 && diff < 30 && (e.voo==='N' || e.hotel==='N');
                const statusClass = isCritical ? 'event-critical' : (e.voo==='S'&&e.hotel==='S'?'event-ok':'event-pending');
                
                dayHtml += `<div class="event-item ${statusClass}" title="[${e.type}] ${e.dest} - Vendedor: ${e.vendor || 'N/A'}">
                                <b>[${e.type}]</b> ${e.dest}
                                <span class="event-vendor">${e.vendor || ''}</span>
                            </div>`;
            });
            grid.innerHTML += dayHtml + `</div>`;
        }
    }

    function renderTable() {
        const body = document.getElementById('tableBody');
        body.innerHTML = '';
        
        const today = new Date();
        today.setHours(0,0,0,0);

        const tableMonthVal = document.getElementById('tableMonth').value;
        const selMonth = tableMonthVal === 'all' ? 'all' : parseInt(tableMonthVal);
        const btnPast = document.getElementById('togglePastBtn');

        if (selMonth !== 'all') {
            btnPast.style.display = 'none';
        } else {
            btnPast.style.display = 'inline-block';
        }

        let countAtrasados = 0;
        let countPendentes = 0;
        let countPagos = 0;

        let viagensParaExibir = travels.filter(t => {
            const [iY, iM, iD] = t.ida.split('-');
            const dataIda = new Date(iY, iM - 1, iD);
            dataIda.setHours(0,0,0,0);
            
            const [vY, vM, vD] = t.volta.split('-');
            const dataVolta = new Date(vY, vM - 1, vD);
            dataVolta.setHours(0,0,0,0);

            const isPast = Math.floor((today - dataVolta) / 86400000) > 0;

            if (selMonth !== 'all') {
                if (dataIda.getMonth() === selMonth || dataVolta.getMonth() === selMonth) {
                    return true; 
                }
                return false; 
            }

            if (hidePastTrips && isPast) {
                return false;
            }

            return true;
        });

        viagensParaExibir.sort((a,b) => new Date(a.ida) - new Date(b.ida)).forEach(t => {
            const [iY, iM, iD] = t.ida.split('-');
            const dataIda = new Date(iY, iM - 1, iD);
            dataIda.setHours(0,0,0,0);
            
            const [vY, vM, vD] = t.volta.split('-');
            const dataVolta = new Date(vY, vM - 1, vD);
            dataVolta.setHours(0,0,0,0);

            const diffLogistica = (dataIda - today) / 86400000;
            const isLogisticaCritical = diffLogistica >= 0 && diffLogistica < 30 && (t.voo==='N' || t.hotel==='N');
            
            const diasPosEvento = Math.floor((today - dataVolta) / 86400000);
            const isPast = diasPosEvento > 0;
            
            let isFinanceiroLate = false;
            let statusFinanceiro = "-";

            if (isPast) {
                if (t.pago === 'S') {
                    countPagos++;
                    statusFinanceiro = "<span style='color:green;'>Finalizado</span>";
                } else if (diasPosEvento > 15) {
                    countAtrasados++;
                    isFinanceiroLate = true;
                    statusFinanceiro = `<span class="alert-text">🚨 COBRAR (${diasPosEvento} dias)</span>`;
                } else {
                    countPendentes++;
                    statusFinanceiro = `<span style="color:#f39c12; font-weight:bold;">Prazo: ${15 - diasPosEvento} dias</span>`;
                }
            } else {
                statusFinanceiro = "<span style='color:#7f8c8d; font-size: 0.9em;'>Aguardando Evento</span>";
            }

            let rowClass = "";
            if (isLogisticaCritical) rowClass = "row-critical";
            else if (isFinanceiroLate) rowClass = "row-finance-alert";

            body.innerHTML += `
                <tr class="${rowClass}">
                    <td data-label="Local"><strong>${t.dest}</strong><br><small>[${t.type || 'TCD'}]</small></td>
                    <td data-label="Vendedor">${t.vendor || '-'}</td>
                    <td data-label="Período" style="white-space: nowrap;">${t.ida.split('-').reverse().join('/')} <br> ${t.volta.split('-').reverse().join('/')}</td>
                    
                    <td data-label="Voo" class="col-divider">
                        <div>
                            <span class="badge ${t.voo==='S'?'badge-s':'badge-n'}">${t.voo}</span>
                        </div>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'voo','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'voo','N')">N</button></div>
                    </td>
                    <td data-label="Hotel">
                        <div>
                            <span class="badge ${t.hotel==='S'?'badge-s':'badge-n'}">${t.hotel}</span>
                        </div>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'hotel','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'hotel','N')">N</button></div>
                    </td>

                    <td data-label="Nota Fiscal" class="col-divider">
                        <div>
                            <span class="badge ${t.nota==='S'?'badge-s':'badge-n'}">${t.nota === 'S' ? 'Recebida' : 'Pendente'}</span>
                        </div>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'nota','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'nota','N')">N</button></div>
                    </td>
                    <td data-label="Pagamento SLA">
                        <div>
                            <span class="badge ${t.pago==='S'?'badge-s':'badge-n'}">${t.pago === 'S' ? 'Pago' : 'Pendente'}</span><br>
                            ${statusFinanceiro}
                        </div>
                        <div class="admin-controls"><button class="btn-status" onclick="setStatus(${t.id},'pago','S')">S</button><button class="btn-status" onclick="setStatus(${t.id},'pago','N')">N</button></div>
                    </td>

                    <td data-label="Ações" class="admin-only">
                        <button class="btn-action" onclick="editTravel(${t.id})">✏️ Editar</button>
                    </td>
                </tr>`;
        });

        document.getElementById('count-atrasados').innerText = countAtrasados;
        document.getElementById('count-pendentes').innerText = countPendentes;
        document.getElementById('count-pagos').innerText = countPagos;
    }

    function exportToExcel() {
        let csv = "\ufeff"; 
        csv += "Destino,Vendedor,Evento,Data Ida,Data Volta,Voo,Hotel,Nota,Pago\n";
        travels.forEach(t => {
            csv += `"${t.dest}","${t.vendor || ''}","${t.type || ''}","${t.ida}","${t.volta}","${t.voo}","${t.hotel}","${t.nota}","${t.pago}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.setAttribute("download", "controle_duratex_pedro.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Leitor inteligente e robusto para qualquer CSV
    function importFromExcel(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            const cleanText = text.replace(/^\uFEFF/, '');
            const lines = cleanText.split('\n').filter(line => line.trim() !== '');

            let newTravels = [];
            
            for (let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if(!line) continue;
                
                let separador = line.includes(';') ? ';' : ',';
                let cols = [];
                let cur = '';
                let inQuotes = false;
                
                for(let j=0; j<line.length; j++) {
                    let c = line[j];
                    if(inQuotes) {
                        if(c === '"') {
                            if(j+1 < line.length && line[j+1] === '"') { cur += '"'; j++; } 
                            else inQuotes = false;
                        } else cur += c;
                    } else {
                        if(c === '"') inQuotes = true;
                        else if(c === separador) { cols.push(cur.trim()); cur = ''; }
                        else cur += c;
                    }
                }
                cols.push(cur.trim());

                if (cols.length >= 9) {
                    newTravels.push({
                        id: Date.now() + i,
                        dest: cols[0] || 'A DEFINIR',
                        vendor: cols[1] || '',
                        type: cols[2] || 'TCD',
                        ida: cols[3],
                        volta: cols[4],
                        voo: cols[5] || 'N',
                        hotel: cols[6] || 'N',
                        nota: cols[7] || 'N',
                        pago: cols[8] || 'N'
                    });
                }
            }

            if (newTravels.length > 0) {
                if(confirm("⚠️ ATENÇÃO: Isso vai APAGAR os dados atuais e substituí-los pelo backup selecionado.\n\nDeseja continuar?")) {
                    travels = newTravels;
                    saveData(); 
                    alert("✅ Backup restaurado com sucesso! " + newTravels.length + " viagens foram carregadas.");
                }
            } else {
                alert("❌ O arquivo parece vazio ou num formato irreconhecível.");
            }
            
            event.target.value = ''; 
        };
        
        reader.readAsText(file, 'UTF-8');
    }

    initDashboard();
</script>
